name: Build/release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          submodules: 'false'
          lfs: 'false'

      - name: Check out hoshidicts
        run: git submodule update --init --recursive vendor/hoshidicts

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release configuration
        shell: bash
        env:
          MAIN_VITE_INTERFACE_URL: ${{ vars.HAYATAN_INTERFACE_URL }}
        run: |
          if [ -z "$MAIN_VITE_INTERFACE_URL" ]; then
            echo "Set the HAYATAN_INTERFACE_URL repository variable before releasing."
            exit 1
          fi

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAIN_VITE_INTERFACE_URL: ${{ vars.HAYATAN_INTERFACE_URL }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm run build:publish
